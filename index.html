        /* 千禧年野生网页基础设置：取消现代居中和内边距，直接贴合浏览器边缘 */
        body {
            margin: 0;
            padding: 0;
            background-color: #2b4476; /* 冰山深水区蓝色背景 */
            font-family: 'Garet', 'Times New Roman', serif; /* 优先Garet，后备复古衬线体 */
            overflow-x: hidden; /* 防止广告弹跳时出现横向滚动条 */
        }

        /* 冰山主容器：去除现代化的阴影圆角等，变回贴图原样 */
        .iceberg-container {
            position: relative;
            width: 1000px;
            height: 2300px;
            background-image: url('assets/Tu3gODl0Yg.jpg'); /* 冰山背景图 */
            background-size: cover;
            background-position: top left;
            background-repeat: no-repeat;
        }

        /* 右侧纯色遮挡板块 */
        .right-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 20%;
            height: 100%;
            background-color: #2b4476;
            z-index: 1;
        }

        /* 闪烁+放大缩小动画 */
        @keyframes flash-scale {
            0% { transform: scale(1) rotate(-10deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(-10deg); opacity: 0.9; color: #fffacd; }
            100% { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        /* 标题文字样式：保留闪烁效果 */
        .title {
            position: absolute;
            top: 15%;
            right: -12%;
            color: #fcff5c; 
            font-family: "Sixtyfour", sans-serif;
            font-size: 3rem;
            font-weight: 700;
            font-variation-settings:
                "BLED" 63,
                "SCAN" -2;
            z-index: 49;
            animation: flash-scale 1.2s infinite ease-in-out; 
        }

        /* 左侧链接区：去除现代 flex 间隔，使用古早的绝对定位或换行 */
        .links-column {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 10;
            line-height: 150px; /* 粗暴的行高拉开间距 */
        }

        /* 词条分类方式 1：层级区域排版 (1-4层) */
        .level-zone {
            position: absolute; 
            left: 5%; /* 往右挪一点，留出左边距 */
            width: 65%; /* 缩小总宽度，不再让词条把左右撑得太满 */
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-content: center; 
            gap: 15px 30px; 
            z-index: 10;
            pointer-events: none; /* 【关键修复】让这块透明的玻璃板彻底失去实体，不阻挡下方任何图片的点击！ */
        }
        #lvl-1 { top: 5%; height: 25%; }
        #lvl-2 { top: 28%; height: 30%; }
        #lvl-3 { top: 60%; height: 20%; }
        #lvl-4 { top: 80%; height: 20%; }

        /* 词条基础样式 */
        .entry-link {
            font-size: 16px;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
            background: none;
            padding: 5px;
            transition: all 0.2s;
            pointer-events: auto; /* 【关键修复】虽然玻璃板失去了实体，但保留词条文字本身的点击功能 */
            text-shadow: -1px 0px 2px rgb(23, 52, 124); 
        }


        /* 词条分类方式 2：颜色样式 (a, b, c, d, e) */
        .style-a { color: #7d3726; text-decoration-color: #7d3726; } .style-a:hover { color: #ff00ff; text-decoration-color: #ff00ff; }
        .style-b { color: #f4e80c; text-decoration-color: #f4e80c; } .style-b:hover { color: #ffffff; text-decoration-color: #ffffff; }
        .style-c { color: #ff8d4b; text-decoration-color: #ffa16a; } .style-c:hover { color: #ffff00; text-decoration-color: #ffff00; }
        .style-d { color: #6efe00; text-decoration-color: #6efe00; } .style-d:hover { color: #00ffff; text-decoration-color: #00ffff; }
        .style-e { color: #ff3fff; text-decoration-color: #ff3fff; } .style-e:hover { color: #ff1212; text-decoration-color: #ff0000; }
        .style-f { color: #0aeefe; text-decoration-color: #0aeefe; } .style-f:hover { color: #00ff62; text-decoration-color: #00ff62; }

            z-index: 9999; 
            width: 200px; /* 如果第二个广告很小，可以单独给它加id修改宽度 */

        }
        .bouncing-ads img {
            width: 100%;
            height: auto;
        }
        /* ================= 全局 CRT 线性扫描滤镜 ================= */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 使用重复的线性渐变画出黑白相间的半透明横线 */
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 2px,
                rgba(0, 0, 0, 0.15) 2px,
                rgba(0, 0, 0, 0.15) 4px
            );
            z-index: 50; /* 确保它的层级极其高，盖住网页上的所有元素 */
            pointer-events: none; /* 让鼠标穿透这层滤镜 */
        }
          /* ================= 全局不对称暗角滤镜 ================= */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* 【核心原理】径向渐变 (radial-gradient)
               circle at 25% 50%：把光源中心强制设定在屏幕偏左侧的位置。
               这样左边大面积是透明的 (transparent)，而右侧因为距离光源远，黑影会被拉得极长、极深！ */
            background: radial-gradient(
                circle at 25% 50%, 
                transparent 65%, 
                rgb(0, 34, 44) 160%
            );
            
            z-index: 49; 
            pointer-events: none; /* 【极其关键】让鼠标完全穿透，绝不阻挡底层的任何点击和悬停事件！ */
        }
    /* ================= 全局 CRT 青白荧光/屏幕反光滤镜 ================= */
        html::before {
            content: " ";
            display: block;
            position: fixed;
            top: 10%;
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* 【核心原理】径向渐变模拟球面显示器的青白荧光 */
            /* circle at 20% 40% 就是您要的“中心位置变量”，可以随时更改 */
            background: radial-gradient(
                circle at 20% 40%, 
                rgba(180, 240, 255, 0.30) 5%,    /* 青白色的强光中心 */
                rgba(180, 240, 255, 0.05) 35%,   /* 光晕向外柔和散开 */
                transparent 45%                  /* 边缘自然消失于黑暗中 */
            );
            
            /* 【屏幕魔法】mix-blend-mode: screen (滤色模式) */
            /* 这会让这层青白色的光像真正的发光体一样叠加在冰山图上，显得通透而不突兀 */
            mix-blend-mode: screen; 
            
            z-index: 49; 
            pointer-events: none; /* 【极其关键】允许鼠标彻底穿透！ */
        }
    </style>

            // 检查输入的密码是否包含上述任意一个关键字

// ===========批量抓取隐藏的图片元素并随机散布=========

            // ================= 友站链接弹窗的控制逻辑 =================
        const siteData = {
            //在这里更新友站
            "site1": { url: "", text: "待更新", img: "" }, 
            "site2": { url: "https://lomia.uk/stories", text: "", img: "assets/site1.png" }, 
            "site3": { url: "https://nauseap.github.io/TGOIhomePage.io", text: "", img: "assets/site2.gif" },
            "site4": { url: "https://www.llds.art/", text: "", img: "assets/site3.gif" },
            "site5": { url: "https://kenyo-github-io.vercel.app/", text: "", img: "assets/site4.gif" },
            "site9": { url: "", text: "在看什么", img: "" }, 
            "site10": { url: "", text: "你是谁呀！真是的", img: "" }

        };

        function updateSiteInfo() {
            const select = document.getElementById('site-select');
            const data = siteData[select.value]; 
            
            const textEl = document.getElementById('snapshot-text');
            const imgEl = document.getElementById('snapshot-img');
            
            if (data.img) {
                imgEl.src = data.img;
                imgEl.style.display = 'block';
                textEl.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                textEl.innerText = data.text || "待更新";
                textEl.style.display = 'block';
            }
        }

        function jumpToSite() {
            const select = document.getElementById('site-select');
            const url = siteData[select.value].url;
            
            if (url && url !== "#") {
                window.open(url, '_blank'); 
            } else {
                alert("该站点尚未更新！");
            }
        }
        

        // =================小广告脚本==========================
        let adData = [
            { id: 'ad-1', x: 0, y: 0, dx: 3.5, dy: 3.5, el: null },
            { id: 'ad-2', x: 200, y: 150, dx: -2.0, dy: 2.0, el: null }
        ];

        function moveAds() {
            // 兼容不同浏览器的视窗大小获取方式
            let winWidth = window.innerWidth || document.documentElement.clientWidth;
            let winHeight = window.innerHeight || document.documentElement.clientHeight;

            for (let i = 0; i < adData.length; i++) {
                let obj = adData[i];
                
                // 核心修复：如果还没拿到 HTML 元素，就去抓取。只要抓到了就存起来，没抓到就等下一次
                if (!obj.el) {
                    obj.el = document.getElementById(obj.id);
                    if (!obj.el) continue; 
                }

                // 获取当前广告宽高，提供保底值防止报错
                let currentWidth = obj.el.offsetWidth || 200;
                let currentHeight = obj.el.offsetHeight || 100;

                // 预判下一步位置
                let nextX = obj.x + obj.dx;
                let nextY = obj.y + obj.dy;

                // 碰到左右边缘：强制拉回边界内，并设定正确的反弹方向
                if (nextX + currentWidth >= winWidth) {
                    nextX = winWidth - currentWidth;
                    obj.dx = -Math.abs(obj.dx);
                } else if (nextX <= 0) {
                    nextX = 0;
                    obj.dx = Math.abs(obj.dx);
                }

                // 碰到上下边缘：强制拉回边界内，并设定正确的反弹方向
                if (nextY + currentHeight >= winHeight) {
                    nextY = winHeight - currentHeight;
                    obj.dy = -Math.abs(obj.dy);
                } else if (nextY <= 0) {
                    nextY = 0;
                    obj.dy = Math.abs(obj.dy);
                }

                // 更新实际坐标
                obj.x = nextX;
                obj.y = nextY;

                // 渲染到屏幕上
                obj.el.style.left = obj.x + 'px';
                obj.el.style.top = obj.y + 'px';
            }
        }

        // 每20毫秒执行移动
        setInterval(moveAds, 20);
        

            </script>
