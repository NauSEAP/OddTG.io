<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGOI Oddeties Iceberg</title>
    <style>
        /* 引入您想要的 Garet 字体，若本地或同目录下有字体文件可取消注释并修改路径 */
        /*
        @font-face {
            font-family: 'Garet';
            src: url('assets/Garet.woff2') format('woff2');
        }
        */

        /* 千禧年野生网页基础设置：取消现代居中和内边距，直接贴合浏览器边缘 */
        body {
            margin: 0;
            padding: 0;
            background-color: #2b4476; /* 冰山深水区蓝色背景 */
            font-family: 'Garet', 'Times New Roman', serif; /* 优先Garet，后备复古衬线体 */
            overflow-x: hidden; /* 防止广告弹跳时出现横向滚动条 */
        }

        /* 冰山主容器：去除现代化的阴影圆角等，变回贴图原样 */
        .iceberg-container {
            position: relative;
            width: 1000px;
            height: 2300px;
            background-image: url('assets/Tu3gODl0Yg.jpg'); /* 冰山背景图 */
            background-size: cover;
            background-position: top left;
            background-repeat: no-repeat;
        }

        /* 右侧纯色遮挡板块 */
        .right-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 20%;
            height: 100%;
            background-color: #2b4476;
            z-index: 1;
        }

        /* 闪烁+放大缩小动画 */
        @keyframes flash-scale {
            0% { transform: scale(1) rotate(-10deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(-10deg); opacity: 0.7; color: #fffacd; }
            100% { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        /* 标题文字样式：保留闪烁效果 */
        .title {
            position: absolute;
            top: 15%;
            right: 5%;
            color: #d7f154; 
            font-size: 3.5rem;
            font-weight: 900;
            z-index: 10;
            animation: flash-scale 1.2s infinite ease-in-out; 
        }

        /* 左侧链接区：去除现代 flex 间隔，使用古早的绝对定位或换行 */
        .links-column {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 10;
            line-height: 150px; /* 粗暴的行高拉开间距 */
        }

        /* 千禧年质朴链接样式：15px，土蓝色，下划线，无背景 */
        .links-column a {
            display: block;
            font-size: 15px;
            color: #3b537a; /* 土土的暗蓝色 */
            text-decoration: underline; /* 强制下划线 */
            font-weight: bold;
            background: none; /* 去除背景方框 */
            padding: 0;
        }
        
        .links-column a:hover {
            color: #ff00ff; /* 千禧年标志性的死亡高亮粉紫，可自行更改 */
        }

        /* 角色图片绝对定位，保持野生的拼贴感 */
        .img-pink { position: absolute; top: 26%; right: 28%; width: 130px; z-index: 5; }
        .img-red { position: absolute; top: 58%; right: 35%; width: 100px; z-index: 5; }

        /* 流泪星星排版 */
        .star { position: absolute; width: 50px; z-index: 5; }
        .s1 { top: 52%; right: 8%; }
        .s2 { top: 60%; right: 16%; }
        .s3 { top: 68%; right: 24%; }
        .s4 { top: 76%; right: 32%; }
        .s5 { top: 84%; right: 40%; }
        .s6 { top: 92%; right: 48%; }
        .s7 { 
            top: 97%; 
            right: 58%; 
            width: 500px; 
            height: 800px; /* 故意设置不符合原图比例的高度，使其被扭曲拉长 */
            z-index: 10; /* 确保层级高，方便点击 */
        }
        /* 隐藏图片初始样式 */
        .hidden-img {
            display: none;
            position: absolute;
            width: 130px;
            z-index: 20;
        }

        /* 古早风密码弹窗样式 */
        #password-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c0c0c0; /* 经典的电脑视窗灰 */
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            padding: 20px;
            z-index: 10000;
            text-align: center;
            width: 350px;
        }
        #password-modal p {
            font-size: 14px;
            color: black;
            margin-top: 0;
            margin-bottom: 15px;
        }
        #password-modal input {
            width: 90%;
            margin-bottom: 10px;
            padding: 4px;
            border: 2px solid;
            border-color: #000000 #dfdfdf #dfdfdf #000000;
            background: #fff;
        }
        #password-modal input::placeholder {
            color: rgba(0, 0, 0, 0.5); /* 半透明黑色文字 */
        }
        #password-modal button {
            padding: 4px 15px;
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            background: #c0c0c0;
            cursor: pointer;
            margin-top: 5px;
        }
        #password-modal button:active {
            border-color: #000000 #dfdfdf #dfdfdf #000000;
        }

        /* 弹窗广告样式：更改了ID名称防拦截，并显式指定初始坐标 */
        #bouncing-window {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999; /* 保证在最顶层 */
            width: 200px; /* 您可根据素材实际比例调整大小 */
            cursor: pointer;
        }
        #bouncing-window img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="iceberg-container">
        <!-- 模拟参考图的右侧深色块 -->
        <div class="right-panel"></div>

        <div class="title">TGOI Oddeties!</div>

        <!-- 左侧自上而下的超链接 -->
        <div class="links-column">
            <!-- 第 1 层 -->
            <a href="https://nauseap.github.io/TGOIhomePage.io">🏠Homepage</a>
            
            <!-- 第 2 层 -->
            <a href="https://nauseap.github.io/TGOIhomePage.io/#footnotes-def-30">预留链接位：浅水区事件</a>
            
            <!-- 第 3 层 -->
            <a href="https://nauseap.github.io/TGOIhomePage.io/#footnotes-def-30">预留链接位：深水区档案</a>
            
            <!-- 第 4 层 -->
            <a href="https://nauseap.github.io/TGOIhomePage.io/#footnotes-def-30">预留链接位：深渊区黑历史</a>
        </div>

        <!-- 角色图片 -->
        <img src="assets/22.png" alt="粉发小神使" class="img-pink">
        <img src="assets/lianyi.png" alt="红发涟漪" class="img-red">

              <!-- 斜向排列的流泪星星 -->
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s1">
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s2">
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s3">
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s4">
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s5">
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s6">
        <!-- 给最底下的星星增加点击开启弹窗事件 -->
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s7" onclick="document.getElementById('password-modal').style.display='block'">

        <!-- 解密后出现的隐藏图片 -->
        <a href="这里填入您隐藏图片的链接1" target="_blank"><img src="assets/Hidden1.PNG" alt="hidden1" class="hidden-img" id="h-img1"></a>
        <a href="这里填入您隐藏图片的链接2" target="_blank"><img src="assets/Hidden2.png" alt="hidden2" class="hidden-img" id="h-img2"></a>
    </div>

    <!-- 弹出的密码输入窗口 -->
    <div id="password-modal">
        <p>请输入正确的账户及密码，新用户输入账户即登记为注册</p>
        <input type="text" placeholder="任意输入您的名字拼音即可" id="acc-input">
        <input type="text" placeholder="密码为网站作者的任意网名的拼音" id="pwd-input">
        <button onclick="checkPassword()">确认</button>
    </div>

    
    <!-- 乱七八糟的弹窗广告 Register.GIF -->
  <a href="https://nauseap.github.io/TGOIhomePage.io/#footnotes-def-23" id="bouncing-window" target="_blank" style="display: block;">
        <img src="assets/Register.GIF" alt="交易中心注册广告" onerror="this.src='assets/Register.Gif'; this.onerror=null;">
    </a>

  <!-- 密码验证与弹窗广告运动脚本 -->
    <script>
        // 密码验证及隐藏图片随机散布显示逻辑
        function checkPassword() {
            // 获取输入的值并转为小写以方便容错比对
            const pwd = document.getElementById('pwd-input').value.toLowerCase();
            // 您要求的几个必须包含的密码关键字
            const validPasswords = ["wuhao", "xingyexia", "budingwuhao", "nausea"];
            
            // 检查输入的密码是否包含上述任意一个关键字
            const isCorrect = validPasswords.some(validPwd => pwd.includes(validPwd));

            if (isCorrect) {
                // 密码正确：隐藏弹窗
                document.getElementById('password-modal').style.display = 'none'; 
                
                // 抓取隐藏的图片元素
                const hImg1 = document.getElementById('h-img1');
                const hImg2 = document.getElementById('h-img2');
                
                // 设定随机范围，使其在 1000x2300 的冰山图内随机散布
                // X轴范围大约 0~800 (留出一点右边距防止溢出), Y轴范围 0~2100
                hImg1.style.top = Math.floor(Math.random() * 2100) + 'px';
                hImg1.style.left = Math.floor(Math.random() * 800) + 'px';
                hImg1.style.display = 'block';

                hImg2.style.top = Math.floor(Math.random() * 2100) + 'px';
                hImg2.style.left = Math.floor(Math.random() * 800) + 'px';
                hImg2.style.display = 'block';
            } else {
                alert("密码错误，请重试！");
            }
        }

 // 更改为获取新的防拦截ID
        const ad = document.getElementById('bouncing-window');
        let x = 0; // 初始 X 坐标
        let y = 0; // 初始 Y 坐标
        let dx = 2.5; // 水平移动速度
        let dy = 2.5; // 垂直移动速度

        function animate() {
            if (!ad) return; // 防止未获取到元素时报错
            const rect = ad.getBoundingClientRect();
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;

            // 加入容错：防止图片未加载时宽度为0导致卡死在边缘
            let currentWidth = rect.width || 200;
            let currentHeight = rect.height || 100;

            // 碰到左右边缘反弹
            if (x + currentWidth >= winWidth || x <= 0) {
                dx = -dx;
            }
            // 碰到上下边缘反弹
            if (y + currentHeight >= winHeight || y <= 0) {
                dy = -dy;
            }

            x += dx;
            y += dy;

            ad.style.transform = `translate(${x}px, ${y}px)`;
            requestAnimationFrame(animate);
        }

        // 关键修复：确保整个页面和图片完全加载完成后，再启动动画
        window.onload = function() {
            requestAnimationFrame(animate);
        };
            </script>
</body>
</html>
