<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGOI Oddeties Iceberg</title>
    <style>
        /* 引入您想要的 Garet 字体，若本地或同目录下有字体文件可取消注释并修改路径 */
        /*
        @font-face {
            font-family: 'Garet';
            src: url('assets/Garet.woff2') format('woff2');
        }
        */

        /* 千禧年野生网页基础设置：取消现代居中和内边距，直接贴合浏览器边缘 */
        body {
            margin: 0;
            padding: 0;
            background-color: #2b4476; /* 冰山深水区蓝色背景 */
            font-family: 'Garet', 'Times New Roman', serif; /* 优先Garet，后备复古衬线体 */
            overflow-x: hidden; /* 防止广告弹跳时出现横向滚动条 */
        }

        /* 冰山主容器：去除现代化的阴影圆角等，变回贴图原样 */
        .iceberg-container {
            position: relative;
            width: 1000px;
            height: 2300px;
            background-image: url('assets/Tu3gODl0Yg.jpg'); /* 冰山背景图 */
            background-size: cover;
            background-position: top left;
            background-repeat: no-repeat;
        }

        /* 右侧纯色遮挡板块 */
        .right-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 20%;
            height: 100%;
            background-color: #2b4476;
            z-index: 1;
        }

        /* 闪烁+放大缩小动画 */
        @keyframes flash-scale {
            0% { transform: scale(1) rotate(-10deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(-10deg); opacity: 0.7; color: #fffacd; }
            100% { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        /* 标题文字样式：保留闪烁效果 */
        .title {
            position: absolute;
            top: 15%;
            right: 5%;
            color: #d7f154; 
            font-size: 3.5rem;
            font-weight: 900;
            z-index: 10;
            animation: flash-scale 1.2s infinite ease-in-out; 
        }

        /* 左侧链接区：去除现代 flex 间隔，使用古早的绝对定位或换行 */
        .links-column {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 10;
            line-height: 150px; /* 粗暴的行高拉开间距 */
        }

        /* 千禧年质朴链接样式：15px，土蓝色，下划线，无背景 */
        .links-column a {
            display: block;
            font-size: 15px;
            color: #3b537a; /* 土土的暗蓝色 */
            text-decoration: underline; /* 强制下划线 */
            font-weight: bold;
            background: none; /* 去除背景方框 */
            padding: 0;
        }
        
        .links-column a:hover {
            color: #ff00ff; /* 千禧年标志性的死亡高亮粉紫，可自行更改 */
        }

        /* 角色图片绝对定位，保持野生的拼贴感 */
        .img-pink { position: absolute; top: 26%; right: 28%; width: 130px; z-index: 5; }
        .img-red { position: absolute; top: 58%; right: 35%; width: 100px; z-index: 5; }
        .img-amigo { position: absolute; top: 10%; right: 50%; width: 300px; z-index: 5; }
        .img-dog { position: absolute; top: 70%; right: 5%; width: 100px; z-index: 5; }
        
        
        /* 流泪星星排版 */
        .star { position: absolute; width: 50px; z-index: 5; }
        .s1 { top: 52%; right: 8%; }
        .s2 { top: 60%; right: 16%; }
        .s3 { top: 68%; right: 24%; }
        .s4 { top: 76%; right: 32%; }
        .s5 { top: 84%; right: 40%; }
        .s6 { top: 92%; right: 48%; }
        .s7 { 
            top: 97%; 
            right: 58%; 
            width: 500px; 
            height: 800px; /* 故意设置不符合原图比例的高度，使其被扭曲拉长 */
            z-index: 10; /* 确保层级高，方便点击 */
        }
        /* 隐藏图片初始样式 */
        .hidden-img {
            display: none;
            position: absolute;
            width: 130px;
            z-index: 20;
        }

        /* 古早风密码弹窗样式 */
        #password-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c0c0c0; /* 经典的电脑视窗灰 */
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            padding: 20px;
            z-index: 10000;
            text-align: center;
            width: 350px;
        }
        #password-modal p {
            font-size: 14px;
            color: black;
            margin-top: 0;
            margin-bottom: 15px;
        }
        #password-modal input {
            width: 90%;
            margin-bottom: 10px;
            padding: 4px;
            border: 2px solid;
            border-color: #000000 #dfdfdf #dfdfdf #000000;
            background: #fff;
        }
        #password-modal input::placeholder {
            color: rgba(0, 0, 0, 0.5); /* 半透明黑色文字 */
        }
        #password-modal button {
            padding: 4px 15px;
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            background: #c0c0c0;
            cursor: pointer;
            margin-top: 5px;
        }
        #password-modal button:active {
            border-color: #000000 #dfdfdf #dfdfdf #000000;
        }
        /* 友站链接弹窗样式（经典的 Windows 98 风格） */
        #links-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c0c0c0;
            border: 2px solid; border-color: #dfdfdf #000000 #000000 #dfdfdf;
            padding: 2px; z-index: 10005;
            text-align: center; width: 300px;
        }
        .modal-header {
            background-color: #000080; color: white; padding: 2px 5px; text-align: left;
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
        .close-btn {
            background-color: #c0c0c0; color: black; border: 2px solid; border-color: #dfdfdf #000000 #000000 #dfdfdf;
            cursor: pointer; padding: 0 4px; font-size: 12px; font-weight: bold;
        }
        .close-btn:active { border-color: #000000 #dfdfdf #dfdfdf #000000; }
        .modal-body { padding: 15px; }
        #links-modal select {
            width: 90%; margin-bottom: 10px; background: #fff; border: 2px solid;
            border-color: #000000 #dfdfdf #dfdfdf #000000; padding: 3px;
        }
        .snapshot-container {
            width: 90%; height: 120px; margin: 0 auto 10px; border: 2px inset #dfdfdf; background: #fff;
            display: flex; align-items: center; justify-content: center; color: #666; overflow: hidden; font-size: 14px;
        }
        .snapshot-container img { max-width: 100%; max-height: 100%; display: none; }
        #links-modal button {
            padding: 4px 15px; border: 2px solid; border-color: #dfdfdf #000000 #000000 #dfdfdf;
            background: #c0c0c0; cursor: pointer;
        }
        #links-modal button:active { border-color: #000000 #dfdfdf #dfdfdf #000000; }

        
        /* 弹窗广告样式：兼容多个广告，保证绝对定位 */
        .bouncing-ads {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999; 
            width: 200px; /* 如果第二个广告很小，可以单独给它加id修改宽度 */
            cursor: pointer;
            display: block;
        }
        .bouncing-ads img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

        <!-- 左侧自上而下的超链接 -->

              <!-- 斜向排列的流泪星星 -->
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s1">

        <!-- 给最底下的星星增加点击开启弹窗事件 -->
        <img src="assets/u2b50_u1f972.png" alt="star" class="star s7" onclick="document.getElementById('password-modal').style.display='block'">

        <a href="这里填入您隐藏图片的链接1" target="_blank"><img src="assets/Hidden1.PNG" alt="hidden1" class="hidden-img" id="h-img1"></a>

    <!-- 弹出的密码输入窗口 -->

        <p>请输入正确的账户及密码，新用户输入账户即登记为注册</p>
        <input type="text" placeholder="任意输入您的名字拼音即可" id="acc-input">

    <!-- 友站链接弹窗 -->

    <!-- 乱七八糟的弹窗广告 Register.GIF -->

  <!-- 密码验证与弹窗广告运动脚本 -->
    <script>
        // 密码验证及隐藏图片随机散布显示逻辑
        function checkPassword() {
            // 获取输入的值并转为小写以方便容错比对
            const pwd = document.getElementById('pwd-input').value.toLowerCase();
            // 您要求的几个必须包含的密码关键字
            const validPasswords = ["wuhao", "xingyexia", "budingwuhao", "nausea"];
            
            // 检查输入的密码是否包含上述任意一个关键字
            const isCorrect = validPasswords.some(validPwd => pwd.includes(validPwd));

            if (isCorrect) {
                // 密码正确：隐藏弹窗
                document.getElementById('password-modal').style.display = 'none'; 
                
// 批量抓取隐藏的图片元素并随机散布
                const hiddenImages = ['h-img1', 'h-img2', 'h-img3', 'h-img4', 'h-img5'];
                hiddenImages.forEach(id => {
                    const img = document.getElementById(id);
                    if (img) {
                        img.style.top = Math.floor(Math.random() * 2100) + 'px';
                        img.style.left = Math.floor(Math.random() * 800) + 'px';
                        img.style.display = 'block';
                    }
                });
            } else {
                alert("密码错误，请重试！");
            }
        }
            // ================= 友站链接弹窗的控制逻辑 =================
        const siteData = {
            "site1": { url: "#", text: "待更新", img: "" }, 
            "site2": { url: "https://nauseap.github.io/TGOIhomePage.io", text: "", img: "assets/Hidden4.jpg" }, 
            "site3": { url: "https://nauseap.github.io/TGOIhomePage.io", text: "", img: "assets/Hidden5.png" }  
        };

        function updateSiteInfo() {
            const select = document.getElementById('site-select');
            const data = siteData[select.value]; 
            
            const textEl = document.getElementById('snapshot-text');
            const imgEl = document.getElementById('snapshot-img');
            
            if (data.img) {
                imgEl.src = data.img;
                imgEl.style.display = 'block';
                textEl.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                textEl.innerText = data.text || "待更新";
                textEl.style.display = 'block';
            }
        }

        function jumpToSite() {
            const select = document.getElementById('site-select');
            const url = siteData[select.value].url;
            
            if (url && url !== "#") {
                window.open(url, '_blank'); 
            } else {
                alert("该站点尚未更新！");
            }
        }

        // 终极暴力防卡死：不提前获取元素，而是自己在循环里通过ID去找！
        let adData = [
            { id: 'ad-1', x: 0, y: 0, dx: 3.5, dy: 3.5, el: null },
            { id: 'ad-2', x: 200, y: 150, dx: -2.0, dy: 2.0, el: null }
        ];

        function moveAds() {
            // 兼容不同浏览器的视窗大小获取方式
            let winWidth = window.innerWidth || document.documentElement.clientWidth;
            let winHeight = window.innerHeight || document.documentElement.clientHeight;

            for (let i = 0; i < adData.length; i++) {
                let obj = adData[i];
                
                // 核心修复：如果还没拿到 HTML 元素，就去抓取。只要抓到了就存起来，没抓到就等下一次
                if (!obj.el) {
                    obj.el = document.getElementById(obj.id);
                    if (!obj.el) continue; 
                }

                // 获取当前广告宽高，提供保底值防止报错
                let currentWidth = obj.el.offsetWidth || 200;
                let currentHeight = obj.el.offsetHeight || 100;

                // 预判下一步位置
                let nextX = obj.x + obj.dx;
                let nextY = obj.y + obj.dy;

                // 碰到左右边缘：强制拉回边界内，并设定正确的反弹方向
                if (nextX + currentWidth >= winWidth) {
                    nextX = winWidth - currentWidth;
                    obj.dx = -Math.abs(obj.dx);
                } else if (nextX <= 0) {
                    nextX = 0;
                    obj.dx = Math.abs(obj.dx);
                }

                // 碰到上下边缘：强制拉回边界内，并设定正确的反弹方向
                if (nextY + currentHeight >= winHeight) {
                    nextY = winHeight - currentHeight;
                    obj.dy = -Math.abs(obj.dy);
                } else if (nextY <= 0) {
                    nextY = 0;
                    obj.dy = Math.abs(obj.dy);
                }

                // 更新实际坐标
                obj.x = nextX;
                obj.y = nextY;

                // 渲染到屏幕上
                obj.el.style.left = obj.x + 'px';
                obj.el.style.top = obj.y + 'px';
            }
        }

        // 抛弃一切顾虑，每20毫秒无脑执行
        setInterval(moveAds, 20);

            </script>
