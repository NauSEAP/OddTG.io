<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGOI Oddities Iceberg</title>
    <style>
        /* 引入您想要的 Garet 字体，若本地或同目录下有字体文件可取消注释并修改路径 */
        /*
        @font-face {
            font-family: 'Garet';
            src: url('assets/Garet.woff2') format('woff2');
        }
        */

        /* 千禧年野生网页基础设置：取消现代居中和内边距，直接贴合浏览器边缘 */
        body {
            margin: 0;
            padding: 0;
            background-color: #2b4476; /* 冰山深水区蓝色背景 */
            font-family: 'Garet', 'Times New Roman', serif; /* 优先Garet，后备复古衬线体 */
            overflow-x: hidden; /* 防止广告弹跳时出现横向滚动条 */
        }

        /* 冰山主容器：去除现代化的阴影圆角等，变回贴图原样 */
        .iceberg-container {
            position: relative;
            width: 1000px;
            height: 2300px;
            background-image: url('assets/Tu3gODl0Yg.jpg'); /* 冰山背景图 */
            background-size: cover;
            background-position: top left;
            background-repeat: no-repeat;
        }

        /* 右侧纯色遮挡板块 */
        .right-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 20%;
            height: 100%;
            background-color: #2b4476;
            z-index: 1;
        }

        /* 闪烁+放大缩小动画 */
        @keyframes flash-scale {
            0% { transform: scale(1) rotate(-10deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(-10deg); opacity: 0.9; color: #fffacd; }
            100% { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        /* 标题文字样式：保留闪烁效果 */
        .title {
            position: absolute;
            top: 15%;
            right: -15%;
            color: #fcff5c; 
            font-size: 4.5rem;
            font-weight: 700;
            z-index: 1000;
            animation: flash-scale 1.2s infinite ease-in-out; 
        }

        /* 左侧链接区：去除现代 flex 间隔，使用古早的绝对定位或换行 */
        .links-column {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 10;
            line-height: 150px; /* 粗暴的行高拉开间距 */
        }

        /* 词条分类方式 1：层级区域排版 (1-4层) */
        .level-zone {
            position: absolute; 
            left: 5%; /* 往右挪一点，留出左边距 */
            width: 65%; /* 缩小总宽度，不再让词条把左右撑得太满 */
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-content: center; 
            gap: 15px 30px; 
            z-index: 10;
            pointer-events: none; /* 【关键修复】让这块透明的玻璃板彻底失去实体，不阻挡下方任何图片的点击！ */
        }
        #lvl-1 { top: 5%; height: 25%; }
        #lvl-2 { top: 25%; height: 25%; }
        #lvl-3 { top: 50%; height: 25%; }
        #lvl-4 { top: 75%; height: 25%; }

        /* 词条基础样式 */
        .entry-link {
            font-size: 16px;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
            background: none;
            padding: 5px;
            transition: all 0.2s;
            pointer-events: auto; /* 【关键修复】虽然玻璃板失去了实体，但保留词条文字本身的点击功能 */
        }


        /* 词条分类方式 2：颜色样式 (a, b, c, d, e) */
        .style-a { color: #533a34; text-decoration-color: #533a34; } .style-a:hover { color: #ff00ff; text-decoration-color: #ff00ff; }
        .style-b { color: #fff86a; text-decoration-color: #fef37d; } .style-b:hover { color: #ffffff; text-decoration-color: #ffffff; }
        .style-c { color: #ffa16a; text-decoration-color: #ffa16a; } .style-c:hover { color: #ffff00; text-decoration-color: #ffff00; }
        .style-d { color: #adfa42; text-decoration-color: #adfa42; } .style-d:hover { color: #00ffff; text-decoration-color: #00ffff; }
        .style-e { color: #dda7dd; text-decoration-color: #dabbda; } .style-e:hover { color: #ff1212; text-decoration-color: #ff0000; }
        .style-f { color: #3adafa; text-decoration-color: #3adafa; } .style-f:hover { color: #00ff62; text-decoration-color: #00ff62; }

        .style-blank { text-decoration: none !important; pointer-events: none; }

        /* 词条分类方式 3：B类(图片)与C类(文字)弹窗的专属样式 */
        #content-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 3px double #fff; padding: 20px; z-index: 10020; width: 400px; text-align: center; color: #fff;
        }
        #content-modal img { max-width: 100%; display: none; margin-bottom: 10px; border: 1px solid #fff;}
        #content-modal p { display: none; font-size: 15px; margin-bottom: 10px; line-height: 1.5; font-family: 'Times New Roman', serif; }

 

        /* 角色图片排版 */
        .img-pink { position: absolute; top: 26%; right: 20%; width: 130px; z-index: 10; }
        .img-red { position: absolute; top: 58%; right: 35%; width: 100px; z-index: 10; }

        .img-dog { position: absolute; top: 70%; right: 5%; width: 100px; z-index: 5; }
        .img-glm { position: absolute; top: 50%; right: 55%; width: 100px; z-index: 10; }
        
        
        /* 流泪星星排版 */
        .star { position: absolute; width: 50px; z-index: 5; }
        .s1 { top: 52%; right: 8%; }
        .s2 { top: 60%; right: 16%; }
        .s3 { top: 68%; right: 24%; }
        .s4 { top: 76%; right: 32%; }
        .s5 { top: 84%; right: 40%; }
        .s6 { top: 92%; right: 48%; }
        .s7 { 
            top: 97%; 
            right: 58%; 
            width: 500px; 
            height: 800px; /* 故意设置不符合原图比例的高度，使其被扭曲拉长 */
            z-index: 10; /* 确保层级高，方便点击 */
        }
        /* 隐藏图片初始样式 */
        .hidden-img {
            display: none;
            position: absolute;
            width: 130px;
            z-index: 20;
        }

        /* 古早风密码弹窗样式 */
        #password-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c0c0c0; /* 经典的电脑视窗灰 */
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            padding: 20px;
            z-index: 10000;
            text-align: center;
            width: 350px;
        }
        
        #password-modal p {
            font-size: 14px;
            color: black;
            margin-top: 0;
            margin-bottom: 15px;
        }
        #password-modal input {
            width: 90%;
            margin-bottom: 10px;
            padding: 4px;
            border: 2px solid;
            border-color: #000000 #dfdfdf #dfdfdf #000000;
            background: #fff;
        }
        #password-modal input::placeholder {
            color: rgba(0, 0, 0, 0.5); /* 半透明黑色文字 */
        }
        #password-modal button {
            padding: 4px 15px;
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            background: #c0c0c0;
            cursor: pointer;
            margin-top: 5px;
        }
        #password-modal button:active {
            border-color: #000000 #dfdfdf #dfdfdf #000000;
        }
        /* 友站链接弹窗样式（经典的 Windows 98 风格） */
        #links-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c0c0c0;
            border: 2px solid; border-color: #dfdfdf #000000 #000000 #dfdfdf;
            padding: 2px; z-index: 10005;
            text-align: center; width: 300px;
        }
        .modal-header {
            background-color: #000080; color: white; padding: 2px 5px; text-align: left;
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
        .close-btn {
            background-color: #c0c0c0; color: black; border: 2px solid; border-color: #dfdfdf #000000 #000000 #dfdfdf;
            cursor: pointer; padding: 0 4px; font-size: 12px; font-weight: bold;
        }
        .close-btn:active { border-color: #000000 #dfdfdf #dfdfdf #000000; }
        .modal-body { padding: 15px; }
        #links-modal select {
            width: 90%; margin-bottom: 10px; background: #fff; border: 2px solid;
            border-color: #000000 #dfdfdf #dfdfdf #000000; padding: 3px;
        }
        .snapshot-container {
            width: 90%; height: 120px; margin: 0 auto 10px; border: 2px inset #dfdfdf; background: #fff;
            display: flex; align-items: center; justify-content: center; color: #666; overflow: hidden; font-size: 14px;
        }
        .snapshot-container img { max-width: 100%; max-height: 100%; display: none; }
        #links-modal button {
            padding: 4px 15px; border: 2px solid; border-color: #dfdfdf #000000 #000000 #dfdfdf;
            background: #c0c0c0; cursor: pointer;
        }
        #links-modal button:active { border-color: #000000 #dfdfdf #dfdfdf #000000; }

        
        /* 弹窗广告样式：兼容多个广告，保证绝对定位 */
        .bouncing-ads {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999; 
            width: 200px; /* 如果第二个广告很小，可以单独给它加id修改宽度 */
            cursor: pointer;
            display: block;
        }
        .bouncing-ads img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

    <script>
        // ======= 0. 全局音效监听 =======
        // 监听鼠标在网页上的所有点击事件，并播放 click.mp3
        document.addEventListener('click', function() {
            let clickAudio = document.getElementById('click-sound');
            if (clickAudio) {
                clickAudio.currentTime = 0; // 重置进度，支持快速连续点击
                clickAudio.play().catch(e => {}); // 防止部分浏览器拦截无交互声音
            }
        });
        // ======= 0.8 通用图片点击引擎 (A/B/C 三合一) =======
        // type 填入 'A', 'B', 或 'C'。content 填入对应的 网址/图片路径/文字！
        function handleAction(type, content) {
            // 如果您还想让点击这些图片时有特殊音效，可以取消下面这行的注释
            document.getElementById('special-sound').play().catch(e=>{});

            if (type === 'A') {
                // A类：直接跳转到新网页
                window.open(content, '_blank');
            } else if (type === 'B') {
                // B类：呼出弹窗并显示图片
                document.getElementById('content-modal-img').src = content;
                document.getElementById('content-modal-img').style.display = 'block';
                document.getElementById('content-modal-text').style.display = 'none';
                document.getElementById('content-modal').style.display = 'block';
            } else if (type === 'C') {
                // C类：呼出弹窗并显示文字
                document.getElementById('content-modal-text').innerText = content;
                document.getElementById('content-modal-text').style.display = 'block';
                document.getElementById('content-modal-img').style.display = 'none';
                document.getElementById('content-modal').style.display = 'block';
            }

            { text: "　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　", level: 1},
            //分行符，如果想要透明只要再加style: 'blank'
            { text: "上原托马斯 / Uehara Thomas", level: 1, style: 'c', type: 'A', url : "https://nauseap.github.io/TGOIhomePage.io/#footnotes-def-9"},
            { text: "星野泪人 / Hoshino NamidaHito", level: 1, style: 'c', type: 'A', url: "https://nauseap.github.io/TGOIhomePage.io/#footnotes-def-6" },

        let adData = [

            { id: 'ad-2', x: 200, y: 150, dx: -2.0, dy: 2.0, el: null }
        ];

        function moveAds() {
            // 兼容不同浏览器的视窗大小获取方式
            let winWidth = window.innerWidth || document.documentElement.clientWidth;
            let winHeight = window.innerHeight || document.documentElement.clientHeight;

            for (let i = 0; i < adData.length; i++) {
                let obj = adData[i];
                
                // 核心修复：如果还没拿到 HTML 元素，就去抓取。只要抓到了就存起来，没抓到就等下一次
                if (!obj.el) {
                    obj.el = document.getElementById(obj.id);
                    if (!obj.el) continue; 
                }

                // 获取当前广告宽高，提供保底值防止报错
                let currentWidth = obj.el.offsetWidth || 200;
                let currentHeight = obj.el.offsetHeight || 100;

                // 预判下一步位置
                let nextX = obj.x + obj.dx;
                let nextY = obj.y + obj.dy;

                // 碰到左右边缘：强制拉回边界内，并设定正确的反弹方向
                if (nextX + currentWidth >= winWidth) {
                    nextX = winWidth - currentWidth;
                    obj.dx = -Math.abs(obj.dx);
                } else if (nextX <= 0) {
                    nextX = 0;
                    obj.dx = Math.abs(obj.dx);
                }

                // 碰到上下边缘：强制拉回边界内，并设定正确的反弹方向
                if (nextY + currentHeight >= winHeight) {
                    nextY = winHeight - currentHeight;
                    obj.dy = -Math.abs(obj.dy);
                } else if (nextY <= 0) {
                    nextY = 0;
                    obj.dy = Math.abs(obj.dy);
                }

                // 更新实际坐标
                obj.x = nextX;
                obj.y = nextY;

                // 渲染到屏幕上
                obj.el.style.left = obj.x + 'px';
                obj.el.style.top = obj.y + 'px';
            }
        }

        // 抛弃一切顾虑，每20毫秒无脑执行
        setInterval(moveAds, 20);
